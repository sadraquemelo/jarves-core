services:
  redis:
    image: redis:7-alpine
    container_name: jarves-redis
    restart: always
    ports:
      - "6379:6379"

  evolution:
    image: atendai/evolution-api:latest
    container_name: jarves-evolution
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_API_KEY=jarves2024
    depends_on:
      - redis
